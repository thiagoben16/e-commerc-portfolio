<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>E-commerce-Portfolio</title>
</head>
<body>
    <header>
        <div class="container-logo-cabecalho">
            <h1>TecStore</h1>
        </div>
        <div class="container-menu-cabecalho"> 
            <img src="menu.png" alt="menu" id="menu-cabecalho">
            <img src="carrinho.png" alt="carrinho" id="carrinho-cabecalho">
        </div>
        
    </header>
    <main>
        <section class="main-banner">
            <h1>Promoção Relâmpago</h1>
            <p>Até 40% OFF nos melhores eletônicos. Aproveite!!</p>
            <a href="#" class="btn-banner" id="btn-banner">Ver Ofertas</a>
        </section>
        <section class="main-cards">
            <div class="card-produto">
                <div class="card-imagem"><img src="celular.jpg" alt="um celular" ></div>
                <div class="card-texto">
                    <h3>Smartphone Ultra Vision 128GB Black</h3>
                    <p>R$ 2.499,00</p>
                    <button class="btn-comprar">Adicionar ao Carrinho</button>
                </div>
            </div>
            <div class="card-produto">
                <div class="card-imagem"><img src="fone.jpg" alt="headFone" ></div>
                <div class="card-texto">
                    <h3>Fone Bluetooth Premium Cancelling</h3>
                    <p>R$ 349,90</p>
                    <button class="btn-comprar">Adicionar ao Carrinho</button>
                </div>
            </div>
        </section>
        <footer>
            <div class="footer-logo">
                <h2>E-commerce Portfolio</h2>
            </div>
            
            <div class="footer-links">
                <a href="#">Início</a> | 
                <a href="#">Produtos</a> | 
                <a href="#">Contato</a>
            </div>
            
            <div class="footer-copy">
                <p>&copy; 2026 Todos os direitos reservados.</p>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
